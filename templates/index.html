<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>99 имён Аллаха</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="app-shell">
        <section class="intro">
            <p class="eyebrow">Спокойное изучение</p>
            <h1>99 имён Аллаха</h1>
            <p class="subtitle">Минималистичные карточки для чтения, запоминания и мягкой практики каждый день.</p>
        </section>

        <section class="study-panel" aria-label="Приложение для изучения">
            <div class="mode-tabs" aria-label="Режимы">
                <button id="studyModeButton" class="mode-tab is-active" type="button">Карточки</button>
                <button id="quizModeButton" class="mode-tab" type="button">Викторина</button>
            </div>

            <div id="studyMode" class="mode-screen">
                <div class="progress-row">
                    <span id="cardNumber">1 / 99</span>
                    <span id="learnedCounter">0 / 99 изучено</span>
                </div>

                <div class="progress-track" aria-hidden="true">
                    <div id="progressFill" class="progress-fill"></div>
                </div>

                <label class="name-picker" for="nameSelect">
                    <span>Выбрать имя</span>
                    <select id="nameSelect" aria-label="Выбрать имя для изучения"></select>
                </label>

                <button id="nameCard" class="name-card" type="button" aria-label="Перевернуть карточку">
                    <div class="card-inner">
                        <div class="card-face card-front">
                            <span class="small-label">Имя</span>
                            <strong id="arabicName" class="arabic"></strong>
                            <span id="russianName" class="name-caption"></span>
                            <span class="tap-hint">Нажми, чтобы открыть значение</span>
                        </div>

                        <div class="card-face card-back">
                            <span class="small-label">Значение</span>
                            <strong id="meaning" class="meaning"></strong>
                            <span id="backRussianName" class="name-caption"></span>
                            <p id="explanation" class="explanation"></p>
                        </div>
                    </div>
                </button>

                <div class="controls">
                    <button id="nextButton" class="primary-button" type="button">Следующее</button>
                    <button id="randomButton" class="secondary-button" type="button">Случайная карточка</button>
                </div>
            </div>

            <div id="quizMode" class="mode-screen is-hidden">
                <div class="quiz-card">
                    <div class="quiz-top">
                        <span id="quizScore">0 правильных</span>
                        <span id="quizRound">Вопрос 1</span>
                    </div>

                    <p class="small-label">Угадай имя по значению</p>
                    <h2 id="quizMeaning"></h2>

                    <div id="answerOptions" class="answer-options" aria-label="Варианты ответа"></div>
                    <p id="quizFeedback" class="quiz-feedback" aria-live="polite"></p>

                    <button id="nextQuizButton" class="primary-button quiz-next" type="button">Новый вопрос</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Jinja sends the Python list into JavaScript as safe JSON. -->
    <script>
        const names = {{ names | tojson }};
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
